    <!-- Inline splash styles — rendered before any JS loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #nss-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #042413; /* deep forest green — Stitch primary */
        transition: opacity 0.5s ease;
      }

      #nss-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* Spinning ring */
      .splash-ring {
        position: relative;
        width: 96px;
        height: 96px;
        flex-shrink: 0;
      }

      .splash-ring-track {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.08);
      }

      .splash-ring-fill {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #1b3a27;   /* Forest Green */
        border-right-color: #a04021;  /* Terracotta */
        animation: splash-spin 1.1s cubic-bezier(0.6,0.2,0.4,0.9) infinite;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }

      /* Logo circle */
      .splash-logo {
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .splash-logo svg {
        width: 52px;
        height: 52px;
      }

      /* Text block */
      .splash-text {
        text-align: center;
        animation: splash-fadein 0.9s 0.3s ease both;
      }

      @keyframes splash-fadein {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .splash-unit {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        margin-bottom: 6px;
      }

      .splash-title {
        font-family: 'Libre Caslon Text', serif;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.2;
        margin-bottom: 8px;
      }

      .splash-title span {
        color: #ff8762;
      }

      .splash-motto {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.55);
        font-style: italic;
      }

      .splash-motto-ml {
        font-family: 'Noto Sans Malayalam', 'Manjari', sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.40);
        margin-top: 4px;
        font-style: normal;
      }

      /* Dot pulse loading indicator */
      .splash-dots {
        display: flex;
        gap: 6px;
        animation: splash-fadein 0.9s 0.8s ease both;
      }

      .splash-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        animation: splash-pulse 1.2s ease infinite;
      }

      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes splash-pulse {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
